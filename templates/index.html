<!DOCTYPE html>

<title>Multi-Site Vulnerability Scanner</title>

<body style="font-family: Arial; max-width: 600px; margin: 40px auto;">
  <h1>Multi-Site Vulnerability Scanner</h1>
  <p>Enter one website URL per line:</p>

    <textarea name="urls" rows="8" style="width:100%;" placeholder="example.com&#10;testphp.vulnweb.com"></textarea>
    <br><br>
    <button type="submit" style="padding:10px 20px;">Scan</button>
  </form>
</body>
